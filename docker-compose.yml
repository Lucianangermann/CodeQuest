services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       codequest
      POSTGRES_USER:     codequest
      POSTGRES_PASSWORD: codequest
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations/001_initial.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./supabase/migrations/003_learning_path.sql:/docker-entrypoint-initdb.d/03_learning_path.sql:ro
      - ./supabase/migrations/004_interview_simulator.sql:/docker-entrypoint-initdb.d/04_interview_simulator.sql:ro
      - ./supabase/migrations/005_more_lessons.sql:/docker-entrypoint-initdb.d/05_more_lessons.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codequest"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:     postgresql://codequest:codequest@postgres:5432/codequest
      JWT_SECRET:       ${JWT_SECRET:-dev-secret-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS:     http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
    depends_on:
      - backend

volumes:
  postgres_data:
